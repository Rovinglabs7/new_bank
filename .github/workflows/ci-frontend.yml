name: CI Frontend

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "config/**"
      - "hooks/**"
      - "context/**"
      - "custom/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - "Dockerfile"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "config/**"
      - "hooks/**"
      - "context/**"
      - "custom/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - "Dockerfile"
      - ".github/workflows/ci-frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build:prod
