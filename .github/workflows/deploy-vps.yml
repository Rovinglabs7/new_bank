name: Deploy VPS Production

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "config/**"
      - "hooks/**"
      - "context/**"
      - "custom/**"
      - "scripts/**"
      - "backend/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - "Dockerfile"
      - "docker-compose.yml"
      - "deploy.sh"
      - "nginx/**"
      - ".dockerignore"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - frontend
          - backend
          - all

concurrency:
  group: vps-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            echo "SSH user: $(whoami)"
            echo "Deploy path: ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"
            git() { command git -c safe.directory="${DEPLOY_PATH}" "$@"; }
            git fetch origin main
            DEPLOY_BASE_REV="$(git rev-parse HEAD)"
            git checkout main
            git reset --hard origin/main
            export DEPLOY_BASE_REV
            chmod +x deploy.sh
            case "${{ github.event.inputs.target || 'auto' }}" in
              frontend) ./deploy.sh --frontend ;;
              backend)  ./deploy.sh --backend ;;
              all)      ./deploy.sh --all ;;
              *)        ./deploy.sh ;;
            esac

  verify-health:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for public site health
        run: |
          set -euo pipefail
          SITE="${{ secrets.PROD_SITE_HOST }}"
          API="${{ secrets.PROD_API_HOST }}"
          for i in $(seq 1 12); do
            if curl -sf "https://${SITE}/api/health" | grep -qx ok; then
              echo "Site health OK"
              break
            fi
            echo "Site not ready yet (${i}/12)..."
            sleep 10
            if [ "$i" -eq 12 ]; then exit 1; fi
          done

      - name: Wait for public API health
        run: |
          set -euo pipefail
          API="${{ secrets.PROD_API_HOST }}"
          for i in $(seq 1 12); do
            if curl -sf "https://${API}/health" | grep -q '"status":"ok"'; then
              echo "API health OK"
              exit 0
            fi
            echo "API not ready yet (${i}/12)..."
            sleep 10
          done
          exit 1

      - name: Confirm home page responds
        run: |
          set -euo pipefail
          SITE="${{ secrets.PROD_SITE_HOST }}"
          code=$(curl -so /dev/null -w "%{http_code}" "https://${SITE}/")
          case "$code" in
            200|301|302|304|307|308) echo "Home page responded with ${code}" ;;
            *) echo "Home page returned ${code}"; exit 1 ;;
          esac
