# Blue-green: web-blue/green (Next.js) + api-blue/green (FastAPI)
# Host nginx proxies to active ports — see deploy.sh and nginx/host-server.conf.example

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-new_bank}
      POSTGRES_USER: ${POSTGRES_USER:-new_bank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-new_bank}"]
      interval: 5s
      timeout: 3s
      retries: 5

  web-blue:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${WEB_IMAGE:-new-bank-web:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-new-bank}-web-blue
    restart: "no"
    ports:
      - "127.0.0.1:${WEB_BLUE_PORT:-8004}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MOCK_MODE: ${MOCK_MODE:-false}
      API_URL: ${API_URL:-https://api.example.com}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  web-green:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${WEB_IMAGE:-new-bank-web:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-new-bank}-web-green
    restart: "no"
    ports:
      - "127.0.0.1:${WEB_GREEN_PORT:-8005}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MOCK_MODE: ${MOCK_MODE:-false}
      API_URL: ${API_URL:-https://api.example.com}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  api-blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${API_IMAGE:-new-bank-api:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-new-bank}-api-blue
    restart: "no"
    ports:
      - "127.0.0.1:${API_BLUE_PORT:-8006}:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-new_bank}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-new_bank}
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-new_bank}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://example.com}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api-green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${API_IMAGE:-new-bank-api:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-new-bank}-api-green
    restart: "no"
    ports:
      - "127.0.0.1:${API_GREEN_PORT:-8007}:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-new_bank}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-new_bank}
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-new_bank}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://example.com}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
